services:
  - type: web
    name: bind-rp-agent-api
    runtime: python
    rootDir: backend
    buildCommand: pip install --prefer-binary --upgrade pip && pip install --prefer-binary -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT --workers 1
    plan: free
    region: oregon
    branch: main
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: GEMINI_PRIMARY_MODEL
        value: gemini-2.5-flash-lite
      - key: GEMINI_ANALYSIS_MODEL
        value: gemini-2.5-flash
      - key: GEMINI_MAX_TOKENS
        value: "2048"
      - key: GEMINI_TEMPERATURE
        value: "0.2"
      - key: BIND_API_BASE_URL
        value: https://api.bind.com.mx/api
      - key: LOG_LEVEL
        value: INFO
      - key: DEBUG
        value: "false"
      - key: RATE_LIMIT_MAX_REQUESTS_PER_DAY
        value: "200"
      - key: RATE_LIMIT_MAX_BIND_CALLS_PER_DAY
        value: "50"
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: APP_ENCRYPTION_KEY
        sync: false
      - key: BIND_API_KEY_DEV
        sync: false
      - key: DEV_BYPASS_TOKEN
        sync: false
      - key: CORS_ORIGINS
        sync: false
